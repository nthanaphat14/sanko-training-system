{% extends "base.html" %}
{% block content %}

<div class="page-head">
  <div>
    <h2>Import Employee Data</h2>
    <div class="muted">อัปโหลดไฟล์ Excel เพื่อเพิ่ม/อัปเดตข้อมูลพนักงาน</div>
  </div>
  <div class="actions">
    <a class="btn ghost" href="{{ url_for('employees_list') }}">กลับ</a>
  </div>
</div>

<div class="card">
  <form method="post" enctype="multipart/form-data">
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <input type="file" name="file" accept=".xlsx" required>
      <button class="btn primary" type="submit">Import</button>
    </div>
  </form>
  <div class="muted" style="margin-top:10px;">
    * ระบบจะอัปเดตทับข้อมูลตามไฟล์ Admin ทุกครั้งที่ Import
  </div>
  
</div>

{% endblock %}
