{% extends "base.html" %}
{% block content %}

<div class="page-head">
  <div>
    <h1>New Training Event</h1>
    <div class="muted">สร้างรอบอบรมใหม่</div>
  </div>

  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <a class="btn ghost" href="{{ url_for('events_list') }}">Back</a>
    <a class="btn" href="{{ url_for('course_new') }}">+ New Course</a>
  </div>
</div>

<div class="card">
  <form method="post" style="display:grid; grid-template-columns:repeat(2,1fr); gap:12px;">

    <div class="field" style="grid-column:1/-1;">
      <label>Course</label>
      <select class="input" name="course_id" required>
        <option value="">-- เลือกหลักสูตร --</option>
        {% for c in courses %}
          <option value="{{ c.id }}"
                  data-trainer="{{ c.vendor or '' }}"
                  data-location="{{ c.location or '' }}"
                  data-title="{{ c.course_name or '' }}">
            {{ c.course_code }} • {{ c.course_name }} • {{ c.course_type }}
          </option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label>Title</label>
      <input class="input" name="title" placeholder="ถ้าไม่กรอก จะใช้ชื่อหลักสูตร">
    </div>

    <div class="field">
      <label>Start Date</label>
      <input class="input" type="date" name="start_date" required>
    </div>

    <div class="field">
      <label>End Date</label>
      <input class="input" type="date" name="end_date">
    </div>

    <div class="field">
      <label>Location</label>
      <input class="input" id="location" name="location">
    </div>

    <div class="field">
      <label>Trainer</label>
      <input class="input" id="trainer" name="trainer">
    </div>

    <div style="grid-column:1/-1; display:flex; gap:10px;">
      <button class="btn primary" type="submit">Save Event</button>
      <a class="btn ghost" href="{{ url_for('events_list') }}">Cancel</a>
    </div>

  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const courseSelect = document.querySelector('select[name="course_id"]');
  const trainerInput = document.getElementById("trainer");
  const locationInput = document.getElementById("location");
  const titleInput = document.getElementById("title");

  if (!courseSelect) return;

  function fillFromSelected() {
    const selected = courseSelect.options[courseSelect.selectedIndex];
    if (!selected) return;

    const trainer = selected.getAttribute("data-trainer") || "";
    const location = selected.getAttribute("data-location") || "";
    const title = selected.getAttribute("data-title") || "";

    if (trainerInput && !trainerInput.value.trim()) {
      trainerInput.value = trainer;
    }

    if (locationInput && !locationInput.value.trim()) {
      locationInput.value = location;
    }

    if (titleInput && !titleInput.value.trim()) {
      titleInput.value = title;
    }
  }

  courseSelect.addEventListener("change", fillFromSelected);

  // ← เพิ่มตรงนี้ เพื่อให้โหลดหน้ามาแล้ว fill ทันที
  fillFromSelected();
});
</script>

{% endblock %}
