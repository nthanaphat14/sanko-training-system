{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:520px; margin:30px auto; padding:18px;">
  <h2 style="margin:0 0 10px 0;">เปลี่ยนรหัสผ่าน</h2>

  <form method="post">
    <div class="muted" style="margin:10px 0 6px;">รหัสเดิม</div>
    <input class="input" name="old_password" type="password" required>

    <div class="muted" style="margin:10px 0 6px;">รหัสใหม่ (อย่างน้อย 10 ตัว)</div>
    <input class="input" name="new_password" type="password" required>

    <div class="muted" style="margin:10px 0 6px;">ยืนยันรหัสใหม่</div>
    <input class="input" name="new_password2" type="password" required>

    <button class="btn" type="submit" style="margin-top:14px;">บันทึก</button>
    <a class="btn ghost" href="{{ url_for('employees_list') }}">ยกเลิก</a>
  </form>
</div>
{% endblock %}
