<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title or "SANKO Training System" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-title">SANKO Training System</div>
      <div class="brand-sub">Employee Data</div>
    </div>
    <div class="top-actions">
      <a class="btn" href="{{ url_for('employees_list') }}">Employee Data</a>
      <a class="btn" href="{{ url_for('trainings_import') }}">
      Training </a>
      <a class="btn" href="{{ url_for('dashboard') }}">Dashboard</a>
    </div>
  </div>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-wrap">
          {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
