{% extends "base.html" %}
{% block content %}

<div class="page-head">
  <div>
    <h1>{% if mode == "new" %}เพิ่มพนักงาน{% else %}แก้ไขพนักงาน: {{ emp.em_id }}{% endif %}</h1>
    <div class="muted">กรอกข้อมูลแล้วกดบันทึก</div>
  </div>
  <div class="actions">
    <a class="btn" href="{{ url_for('employees_list') }}">← กลับ</a>
  </div>
</div>

<div class="card">
  <form method="post" class="form-grid">

    <div class="field">
      <label>No.</label>
      <input name="no" value="{{ emp.no if emp else '' }}">
    </div>

    <div class="field">
      <label>Em. ID (ห้ามซ้ำ)</label>
      {% if mode == "edit" %}
        <input value="{{ emp.em_id }}" disabled>
      {% else %}
        <input name="em_id" required>
      {% endif %}
    </div>

    <div class="field">
      <label>ID Card</label>
      <input name="id_card" value="{{ emp.id_card if emp else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">ชื่อไทย</h3>

    <div class="field">
      <label>คำนำหน้า (TH)</label>
      <input name="title_th" value="{{ emp.title_th if emp else '' }}">
    </div>
    <div class="field">
      <label>ชื่อ (TH)</label>
      <input name="first_name_th" value="{{ emp.first_name_th if emp else '' }}">
    </div>
    <div class="field">
      <label>นามสกุล (TH)</label>
      <input name="last_name_th" value="{{ emp.last_name_th if emp else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">ชื่ออังกฤษ</h3>

    <div class="field">
      <label>Title (EN)</label>
      <input name="title_en" value="{{ emp.title_en if emp else '' }}">
    </div>
    <div class="field">
      <label>First name (EN)</label>
      <input name="first_name_en" value="{{ emp.first_name_en if emp else '' }}">
    </div>
    <div class="field">
      <label>Last name (EN)</label>
      <input name="last_name_en" value="{{ emp.last_name_en if emp else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">ตำแหน่ง/หน่วยงาน</h3>

    <div class="field">
      <label>Position</label>
      <input name="position" value="{{ emp.position if emp else '' }}">
    </div>
    <div class="field">
      <label>Section</label>
      <input name="section" value="{{ emp.section if emp else '' }}">
    </div>
    <div class="field">
      <label>Department</label>
      <input name="department" value="{{ emp.department if emp else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">วันที่/สถานะ</h3>

    <div class="field">
      <label>Start work</label>
      <input name="start_work" value="{{ emp.start_work if emp else '' }}" placeholder="yyyy-mm-dd">
    </div>
    <div class="field">
      <label>Resign</label>
      <input name="resign" value="{{ emp.resign if emp else '' }}" placeholder="yyyy-mm-dd">
    </div>
    <div class="field">
      <label>Status</label>
      <input name="status" value="{{ emp.status if emp else '' }}">
    </div>

    <div class="field">
      <label>Degree</label>
      <input name="degree" value="{{ emp.degree if emp else '' }}">
    </div>
    <div class="field">
      <label>Major</label>
      <input name="major" value="{{ emp.major if emp else '' }}">
    </div>
    <div></div>

    <div class="actions-row">
      <button class="btn primary" type="submit">บันทึก</button>
      <a class="btn ghost" href="{{ url_for('employees_list') }}">ยกเลิก</a>
    </div>
  </form>
</div>

{% endblock %}
