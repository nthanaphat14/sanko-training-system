{% extends "base.html" %}
{% block content %}

<div class="page-head">
  <div>
    <h1>
      {% if employee %}
        แก้ไขพนักงาน: {{ employee.em_id }}
      {% else %}
        เพิ่มพนักงาน
      {% endif %}
    </h1>
    <div class="muted">กรอกข้อมูลแล้วกดบันทึก</div>
  </div>
  <div class="actions">
    <a class="btn" href="{{ url_for('employees_list') }}">← กลับ</a>
  </div>
</div>

<div class="card">
  <form method="post" class="form-grid">

    <div class="field">
      <label>No.</label>
      <input name="no" value="{{ employee.no if employee and employee.no is not none else '' }}">
    </div>

    <div class="field">
      <label>Em. ID (ห้ามซ้ำ)</label>
      {% if employee %}
        <input value="{{ employee.em_id }}" disabled>
        <!-- ถ้าคุณอยากให้ POST ส่ง em_id มาด้วย ให้เปิดใช้บรรทัดนี้ -->
        <!-- <input type="hidden" name="em_id" value="{{ employee.em_id }}"> -->
      {% else %}
        <input name="em_id" required>
      {% endif %}
    </div>

    <div class="field">
      <label>ID Card</label>
      <input name="id_card" value="{{ employee.id_card if employee else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">ชื่อไทย</h3>

    <div class="field">
      <label>คำนำหน้า (TH)</label>
      <input name="title_th" value="{{ employee.title_th if employee else '' }}">
    </div>
    <div class="field">
      <label>ชื่อ (TH)</label>
      <input name="first_name_th" value="{{ employee.first_name_th if employee else '' }}">
    </div>
    <div class="field">
      <label>นามสกุล (TH)</label>
      <input name="last_name_th" value="{{ employee.last_name_th if employee else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">ชื่ออังกฤษ</h3>

    <div class="field">
      <label>Title (EN)</label>
      <input name="title_en" value="{{ employee.title_en if employee else '' }}">
    </div>
    <div class="field">
      <label>First name (EN)</label>
      <input name="first_name_en" value="{{ employee.first_name_en if employee else '' }}">
    </div>
    <div class="field">
      <label>Last name (EN)</label>
      <input name="last_name_en" value="{{ employee.last_name_en if employee else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">ตำแหน่ง/หน่วยงาน</h3>

    <div class="field">
      <label>Position</label>
      <input name="position" value="{{ employee.position if employee else '' }}">
    </div>
    <div class="field">
      <label>Section</label>
      <input name="section" value="{{ employee.section if employee else '' }}">
    </div>
    <div class="field">
      <label>Department</label>
      <input name="department" value="{{ employee.department if employee else '' }}">
    </div>

    <div class="sep"></div>
    <h3 class="section-title">วันที่/สถานะ</h3>

    <div class="field">
      <label>Start work</label>
      <input type="date" name="start_work"
             value="{{ employee.start_work.isoformat() if employee and employee.start_work else '' }}">
    </div>
    <div class="field">
      <label>Resign</label>
      <input type="date" name="resign"
             value="{{ employee.resign.isoformat() if employee and employee.resign else '' }}">
    </div>
    <div class="field">
      <label>Status</label>
      <input name="status" value="{{ employee.status if employee else '' }}" placeholder="W / RS">
    </div>

    <div class="field">
      <label>Degree</label>
      <input name="degree" value="{{ employee.degree if employee else '' }}">
    </div>
    <div class="field">
      <label>Major</label>
      <input name="major" value="{{ employee.major if employee else '' }}">
    </div>
    <div></div>

    <div class="actions-row">
      <button class="btn primary" type="submit">บันทึก</button>
      <a class="btn ghost" href="{{ url_for('employees_list') }}">ยกเลิก</a>
    </div>
  </form>
</div>

{% endblock %}
