{% extends "base.html" %}
{% block content %}
<div class="page-head">
  <div>
    <h1>Admin: Users</h1>
    <div class="muted">รีเซ็ตรหัสผ่านได้ แต่ “ดูรหัสเดิมไม่ได้” (เพื่อความปลอดภัย)</div>
  </div>
  <div class="actions">
    <a class="btn ghost" href="{{ url_for('employees_list') }}">กลับ</a>
  </div>
</div>

<div class="table-wrap card">
  <table class="table">
    <thead>
      <tr>
        <th>Email</th>
        <th>Role</th>
        <th>Active</th>
        <th>Reset Password</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td>{{ "Yes" if u.is_active else "No" }}</td>
        <td>
          <form method="post" action="{{ url_for('admin_reset_password', user_id=u.id) }}" style="display:flex; gap:8px; align-items:center;">
            <input class="input" name="new_password" type="password" placeholder="New password (>=10)" required>
            <button class="btn danger" type="submit" onclick="return confirm('ยืนยันรีเซ็ตรหัสผ่านให้ {{ u.email }} ?')">Reset</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
