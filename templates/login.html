{% extends "base.html" %}
{% block content %}

<div class="card" style="max-width:420px; margin:40px auto; padding:22px;">

  <h2 style="margin:0 0 16px 0;">เข้าสู่ระบบ</h2>

  <form method="post" action="{{ url_for('login_post') }}" autocomplete="off">

    <div class="muted" style="margin:10px 0 6px;">Email</div>
    <input 
      class="input"
      type="email"
      name="email"
      value=""
      autocomplete="off"
      required
    >

    <div class="muted" style="margin:14px 0 6px;">Password</div>
    <input 
      class="input"
      type="password"
      name="password"
      value=""
      autocomplete="new-password"
      required
    >

    <button class="btn" type="submit" style="margin-top:18px; width:100%;">
      Login
    </button>

  </form>

</div>

{% endblock %}
